name: CI_114062576

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

# 🔑 修正點 1：必須加上這個權限區塊，解決 "Failed to create checks" 錯誤
permissions:
  contents: read
  id-token: write
  statuses: write
  checks: write

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: 'npm' # 自動快取 npm 依賴項目，加速 CI 執行

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Typecheck
        run: npm run typecheck

      - name: Prettier Code Style Check
        run: npm run format:check

      - name: Run Tests with JUnit Reporter
        run: |
          mkdir -p reports
          npm run test -- --reporter=default --reporter=junit --outputFile=reports/vitest-junit.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # 確保測試失敗時也能上傳並顯示報表
        with:
          report_paths: 'reports/vitest-junit.xml'
          detailed_summary: true
          include_passed: true

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/
          if-no-files-found: error